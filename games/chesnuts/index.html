<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Chesnuts</title>
  <link rel="stylesheet" href="/shared/reset.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      background: #1a1a2e;
      color: #eee;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 1.5rem 1rem;
    }

    .back-link {
      align-self: flex-start;
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .back-link:hover { color: #e94560; }

    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #e94560;
    }

    .page-header .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-top: 0.25rem;
    }

    /* Auth forms */
    .auth-container {
      width: 100%;
      max-width: 400px;
    }

    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-radius: 12px;
      overflow: hidden;
      background: #16213e;
    }

    .tab-btn {
      flex: 1;
      padding: 0.75rem;
      border: none;
      background: transparent;
      color: #888;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tab-btn.active {
      background: #e94560;
      color: #fff;
    }

    .auth-form {
      display: none;
      flex-direction: column;
      gap: 1rem;
    }

    .auth-form.active {
      display: flex;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.3rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #16213e;
      border-radius: 10px;
      background: #16213e;
      color: #eee;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #e94560;
    }

    .submit-btn {
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .submit-btn:active:not(:disabled) {
      opacity: 0.8;
    }

    .form-error {
      color: #ff6b6b;
      font-size: 0.85rem;
      min-height: 1.2em;
    }

    /* Dashboard */
    .dashboard {
      display: none;
      width: 100%;
      max-width: 480px;
      flex-direction: column;
      gap: 1.5rem;
    }

    .dashboard.active {
      display: flex;
    }

    .welcome-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .welcome-bar .greeting {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .logout-btn {
      padding: 0.4rem 1rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: transparent;
      color: #888;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .logout-btn:hover { color: #e94560; border-color: #e94560; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }

    .stat-card {
      background: #16213e;
      border-radius: 14px;
      padding: 1.25rem 1rem;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: #e94560;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #888;
      margin-top: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Action buttons on dashboard */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .action-btn {
      padding: 1.25rem 1rem;
      border: none;
      border-radius: 14px;
      background: #16213e;
      color: #eee;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s, transform 0.1s;
    }

    .action-btn:active { transform: scale(0.97); }
    .action-btn.primary { background: #e94560; color: #fff; }
    .action-btn .action-icon { font-size: 1.5rem; display: block; margin-bottom: 0.3rem; }

    /* Category selection */
    .category-screen, .play-screen, .history-screen {
      display: none;
      width: 100%;
      max-width: 480px;
      flex-direction: column;
      gap: 1rem;
    }

    .category-screen.active, .play-screen.active, .history-screen.active {
      display: flex;
    }

    .screen-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .back-btn {
      padding: 0.4rem 0.8rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: transparent;
      color: #888;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .back-btn:hover { color: #e94560; border-color: #e94560; }

    .screen-header h2 {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .category-card {
      background: #16213e;
      border-radius: 14px;
      padding: 1.5rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .category-card:active { transform: scale(0.98); }
    .category-card:hover { background: #1a2744; }

    .category-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .category-card .category-meta {
      font-size: 0.8rem;
      color: #888;
    }

    /* Play screen */
    .question-card {
      background: #16213e;
      border-radius: 14px;
      padding: 1.5rem;
      text-align: center;
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      color: #888;
    }

    .difficulty-badge {
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
    }

    .difficulty-easy { background: #2d6a4f; color: #b7e4c7; }
    .difficulty-medium { background: #e76f51; color: #fce4d6; }
    .difficulty-hard { background: #9b2226; color: #fcd5ce; }

    .question-prompt {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .option-btn {
      padding: 0.9rem 1rem;
      border: 2px solid #2a2a4a;
      border-radius: 12px;
      background: #0f1129;
      color: #eee;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-align: left;
    }

    .option-btn:hover:not(:disabled) { border-color: #e94560; }
    .option-btn:disabled { cursor: default; }
    .option-btn.correct { border-color: #2d6a4f; background: #1a3d2e; color: #b7e4c7; }
    .option-btn.wrong { border-color: #9b2226; background: #3d1a1e; color: #fcd5ce; }
    .option-btn.reveal { border-color: #2d6a4f; background: #1a3d2e; color: #b7e4c7; }

    /* Chess board */
    .chess-board-container {
      display: none;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    .chess-canvas {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      cursor: pointer;
      touch-action: none;
    }

    .chess-instruction {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.75rem;
    }

    /* Result feedback */
    .result-card {
      display: none;
      background: #16213e;
      border-radius: 14px;
      padding: 1.5rem;
      text-align: center;
    }

    .result-card.active { display: block; }

    .result-emoji { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .result-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; }
    .result-earnings { color: #e94560; font-size: 0.95rem; margin-bottom: 0.2rem; }
    .result-streak { color: #888; font-size: 0.85rem; }

    .next-btn {
      margin-top: 1rem;
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .next-btn:active { opacity: 0.8; }

    /* Streak banner */
    .streak-banner {
      display: none;
      background: linear-gradient(135deg, #e94560, #c0392b);
      border-radius: 14px;
      padding: 1rem;
      text-align: center;
      font-weight: 700;
      font-size: 1.1rem;
      animation: streakPulse 0.5s ease;
    }

    .streak-banner.active { display: block; }

    @keyframes streakPulse {
      0% { transform: scale(0.9); opacity: 0; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* History screen */
    .history-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .history-item {
      background: #16213e;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }

    .history-item .h-prompt {
      flex: 1;
      margin-right: 0.75rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-item .h-result {
      font-weight: 700;
      white-space: nowrap;
    }

    .h-correct { color: #b7e4c7; }
    .h-wrong { color: #fcd5ce; }
    .h-earned { color: #e94560; margin-left: 0.5rem; font-size: 0.8rem; }

    .history-empty {
      text-align: center;
      color: #666;
      padding: 2rem;
    }

    .load-more-btn {
      padding: 0.7rem;
      border: 1px solid #333;
      border-radius: 10px;
      background: transparent;
      color: #888;
      font-size: 0.9rem;
      cursor: pointer;
      text-align: center;
    }

    .load-more-btn:hover { color: #e94560; border-color: #e94560; }

    .loading {
      text-align: center;
      color: #666;
      padding: 3rem;
    }
  </style>
</head>
<body>
  <a href="/" class="back-link">&larr; Triangle Games</a>

  <div class="page-header">
    <h1>Chesnuts</h1>
    <p class="subtitle">Solve puzzles. Earn Chesnuts. Claim rewards.</p>
  </div>

  <div id="loading" class="loading">Loading...</div>

  <!-- Auth section (shown when logged out) -->
  <div id="auth" class="auth-container" style="display:none">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="login">Login</button>
      <button class="tab-btn" data-tab="register">Register</button>
    </div>

    <form id="login-form" class="auth-form active" autocomplete="on">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" name="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" required autocomplete="current-password">
      </div>
      <div class="form-error" id="login-error"></div>
      <button type="submit" class="submit-btn">Login</button>
    </form>

    <form id="register-form" class="auth-form" autocomplete="on">
      <div class="form-group">
        <label for="reg-name">Display Name</label>
        <input type="text" id="reg-name" name="displayName" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" name="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" name="password" required minlength="6" autocomplete="new-password">
      </div>
      <div class="form-error" id="register-error"></div>
      <button type="submit" class="submit-btn">Create Account</button>
    </form>
  </div>

  <!-- Dashboard (shown when logged in) -->
  <div id="dashboard" class="dashboard">
    <div class="welcome-bar">
      <span class="greeting">Hey, <span id="user-name"></span>!</span>
      <button class="logout-btn" id="logout-btn">Logout</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-balance">0</div>
        <div class="stat-label">Chesnuts</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-streak">0</div>
        <div class="stat-label">Streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-best">0</div>
        <div class="stat-label">Best</div>
      </div>
    </div>

    <div class="action-grid">
      <button class="action-btn primary" id="play-btn">
        <span class="action-icon">&#9654;</span>
        Play
      </button>
      <button class="action-btn" id="history-btn">
        <span class="action-icon">&#128203;</span>
        History
      </button>
    </div>
  </div>

  <!-- Category selection -->
  <div id="category-screen" class="category-screen">
    <div class="screen-header">
      <button class="back-btn" id="cat-back-btn">&larr;</button>
      <h2>Choose a Category</h2>
    </div>
    <div id="category-list"></div>
  </div>

  <!-- Play screen -->
  <div id="play-screen" class="play-screen">
    <div class="screen-header">
      <button class="back-btn" id="play-back-btn">&larr;</button>
      <h2 id="play-category-name">Spanish Vocab</h2>
    </div>

    <div id="streak-banner" class="streak-banner"></div>

    <div id="question-card" class="question-card">
      <div class="question-meta">
        <span class="difficulty-badge" id="q-difficulty">EASY</span>
        <span id="q-reward">+1 Chesnut</span>
      </div>
      <div class="question-prompt" id="q-prompt">Loading...</div>
      <div class="options-grid" id="q-options"></div>
    </div>

    <div id="chess-board-container" class="chess-board-container">
      <canvas id="chess-canvas" class="chess-canvas"></canvas>
      <div id="chess-instruction" class="chess-instruction"></div>
    </div>

    <div id="result-card" class="result-card">
      <div class="result-emoji" id="r-emoji"></div>
      <div class="result-text" id="r-text"></div>
      <div class="result-earnings" id="r-earnings"></div>
      <div class="result-streak" id="r-streak"></div>
      <button class="next-btn" id="next-btn">Next Question</button>
    </div>
  </div>

  <!-- History screen -->
  <div id="history-screen" class="history-screen">
    <div class="screen-header">
      <button class="back-btn" id="hist-back-btn">&larr;</button>
      <h2>History</h2>
    </div>

    <div class="history-stats">
      <div class="stat-card">
        <div class="stat-value" id="hist-total">0</div>
        <div class="stat-label">Attempted</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="hist-correct">0</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="hist-earned">0</div>
        <div class="stat-label">Earned</div>
      </div>
    </div>

    <div id="history-list" class="history-list"></div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
